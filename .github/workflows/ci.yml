name: CI

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: .

jobs:
  # ── Quality gates ─────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ${{ github.workspace }}/website/node_modules
          key: ${{ runner.os }}-bun-website-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-website-

      - name: Install website dependencies
        run: bun install --frozen-lockfile --filter './website'

      - name: Lint
        run: bun run --cwd website lint

      - name: Type-check
        run: bun run --cwd website build.types

  # ── Build ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ${{ github.workspace }}/website/node_modules
          key: ${{ runner.os }}-bun-website-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-website-

      - name: Install website dependencies
        run: bun install --frozen-lockfile --filter './website'

      - name: Build client
        run: bun run --cwd website build.client

      - name: Build server (Cloudflare Pages)
        run: bun run --cwd website build.server

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: website/dist
          retention-days: 1

  # ── Deploy to Cloudflare Pages ─────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: website/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=life-copilot-website --branch=main
          workingDirectory: website
